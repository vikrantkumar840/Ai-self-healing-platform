apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: ai-self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: vikrant840/ai-self-healing-ai-engine:latest
        ports:
        - containerPort: 8000
        env:
        - name: EXECUTION_URL
          value: "http://execution:8000/execute"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health      # [1] FIX: was "/" — now uses /health endpoint
            port: 8000
          initialDelaySeconds: 15  # [2] FIX: was 5 — Python needs more time
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health      # [1] FIX: was "/" — now uses /health endpoint
            port: 8000
          initialDelaySeconds: 30  # [2] FIX: was 10 — prevents premature kills
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: ai-self-healing
  annotations:
    prometheus.io/scrape: "true"   # [3] FIX: was missing on ai-engine service
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  labels:
    app: ai-engine
spec:
  selector:
    app: ai-engine
  ports:
  - name: http
    port: 8000
    targetPort: 8000
