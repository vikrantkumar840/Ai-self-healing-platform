apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution
  template:
    metadata:
      labels:
        app: execution
    spec:
      containers:
      - name: execution
        image: vikrant840/execution:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
spec:
  selector:
    app: execution
  ports:
    - port: 8000
      targetPort: 8000