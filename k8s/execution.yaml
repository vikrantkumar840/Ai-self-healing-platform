apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution
  namespace: ai-self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution
  template:
    metadata:
      labels:
        app: execution
    spec:
      serviceAccountName: execution-sa   # [1] FIX: was missing — caused 403 on pod delete
      containers:
      - name: execution
        image: vikrant840/ai-self-healing-execution:latest
        ports:
        - containerPort: 8000
        env:
        - name: NOTIFICATION_URL
          value: "http://notification:8000/notify"
        - name: NAMESPACE
          value: "ai-self-healing"       # [2] FIX: was missing — defaulted to "default" ns
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15        # [3] FIX: was 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30        # [3] FIX: was 10
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: execution
  namespace: ai-self-healing
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  labels:
    app: execution
spec:
  selector:
    app: execution
  ports:
  - name: http
    port: 8000
    targetPort: 8000
