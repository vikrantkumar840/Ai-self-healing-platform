
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring
  namespace: ai-self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring
  template:
    metadata:
      labels:
        app: monitoring
    spec:
      containers:
      - name: monitoring
        image: vikrant840/ai-self-healing-monitoring:latest
        ports:
        - containerPort: 8000
        env:
        - name: AI_ENGINE_URL
          value: "http://ai-engine:8000/alert"  # [1] FIX: was /analyze → now /alert
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15               # [2] FIX: was 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30               # [2] FIX: was 10
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring
  namespace: ai-self-healing
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  labels:
    app: monitoring
spec:
  selector:
    app: monitoring
  ports:
  - name: http
    port: 8000
    targetPort: 8000
