apiVersion: v1
kind: ServiceAccount
metadata:
  name: execution-sa
  namespace: ai-self-healing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager
  namespace: ai-self-healing
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-manager-binding
  namespace: ai-self-healing
subjects:
  - kind: ServiceAccount
    name: execution-sa
    namespace: ai-self-healing
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-manager
